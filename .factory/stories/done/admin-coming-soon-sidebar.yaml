feature:
  name: Add Context to 'Coming Soon' Sidebar Links
  slug: admin-coming-soon-sidebar
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  The sidebar navigation includes links to pending pages (like /admin/challenges, /admin/analytics) which simply show a
  "Coming Soon" page. The sidebar links should visually indicate they are disabled to prevent unnecessary navigation.
dependencies: []
modules:
  - name: AdminSidebar
    path: src/components/admin/Sidebar.tsx
    description: Update the navigation data array with a disabled/comingSoon flag. Render them with reduced opacity, a
      "Soon" badge, and prevent default navigation.
behavior:
  - Pending sidebar links visually appear disabled/greyed-out.
  - A small "Soon" badge indicates status.
  - Clicking them does not navigate away from the current functional page.
config: {}
status: done
