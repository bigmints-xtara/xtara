feature:
  name: Improve Deployment Script Architecture and Security
  slug: orchestration-deploy-script
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  The current deploy.sh script relies on a hardcoded service account key and standard docker build. This poses security
  risks and can cause extremely slow builds on ARM architectures due to QEMU emulation during local docker build.
dependencies: []
modules:
  - name: DeployScript
    path: deploy.sh
    description: Replaces docker build with docker buildx build to improve cross-platform build performance. Removes
      hardcoded serviceAccountKey_Prod.json dependency in favor of Workload Identity Federation or ADC.
behavior:
  - Uses Workload Identity Federation or ADC instead of local keys.
  - Uses docker buildx for multi-architecture builds.
  - Pushes to a dedicated and versioned Artifact Registry repository instead of default cloud-run-source-deploy.
config: {}
status: done
