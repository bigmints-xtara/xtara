feature:
  name: Migrate Hard-Coded Firebase Config to Environment Variables
  slug: security-hardcoded-firebase-config
target:
  app: xtara-web
phase: 2
dependsOn: []
description: >
  The Firebase configuration in `src/lib/firebase/firebase.ts` is hard-coded as a JavaScript object with 6 fields
  (apiKey, appId, messagingSenderId, projectId, authDomain, storageBucket, measurementId). These values are visible in
  the browser dev tools and bundle, and are the same across environments (dev, staging, prod). The audit confirmed the
  config is hard-coded and not using environment variables or a `.env` file. This makes it hard to deploy to multiple
  environments without code changes and exposes credentials in the client bundle. The `G-1J324NZLJS` Google Analytics ID
  in the layout is also hard-coded.
dependencies: []
modules:
  - name: FirebaseEnvConfig
    path: src/lib/firebase/firebase.ts
    description: Replace hard-coded config object with `process.env.NEXT_PUBLIC_FIREBASE_*` environment variables. Add
      fallbacks for development.
  - name: EnvExample
    path: .env.example
    description: Add all Firebase and Algolia env variables with descriptions.
  - name: LayoutScripts
    path: src/app/layout.tsx
    description: Replace hard-coded GTag ID with `process.env.NEXT_PUBLIC_GA_ID`.
  - name: NextConfig
    path: next.config.ts
    description: Ensure all `NEXT_PUBLIC_*` variables are exposed to the client bundle via Next.js env var mapping.
behavior:
  - Firebase config uses `process.env.NEXT_PUBLIC_FIREBASE_*` variables.
  - .env.example documents all required environment variables.
  - Layout uses `process.env.NEXT_PUBLIC_GA_ID` for Google Analytics.
  - Dev fallback provides sensible defaults when env vars are missing.
  - Production build fails with clear error messages for missing required vars.
  - No Firebase credentials are hard-coded in the client bundle.
config: {}
status: done
