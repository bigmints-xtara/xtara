feature:
  name: Fix Duplicate Data in Story List
  slug: admin-duplicate-list
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  The left pane in /admin/stories displays identical duplicates for every entry. While the header might say "Showing 14
  of 14", there are actually only 7 unique stories, each appearing exactly twice.
dependencies: []
modules:
  - name: AdminMasterDetail
    path: src/components/admin/AdminMasterDetail.tsx
    description: Check the entities array management for improper duplication or missing dedup logic.
  - name: AdminDataHook
    path: src/lib/hooks/useAdminData.ts
    description: If data fetching pushes to array in useEffect, ensure it replaces the array or dedups by ID, preventing
      React Strict Mode double-mounting from creating duplicates.
behavior:
  - The story list displays exactly the number of unique records present in the database.
  - The counter accurately reflects the unique count.
  - No single story appears twice in the UI.
config: {}
status: done
