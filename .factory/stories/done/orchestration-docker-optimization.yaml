feature:
  name: Optimize Dockerfile for Reproducibility
  slug: orchestration-docker-optimization
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  The current Dockerfile uses npm install, which can lead to non-deterministic dependency resolution and different
  behaviors across environments. Using standard install processes in CI/CD and container builds creates unpredictable
  artifacts.
dependencies: []
modules:
  - name: Dockerfile
    path: Dockerfile
    description: Replaces npm install with npm ci in the deps stage to ensure deterministic builds.
  - name: Dockerignore
    path: .dockerignore
    description: Covers all unnecessary files to prevent context bloat.
behavior:
  - Builds deterministically using package-lock.json via npm ci.
  - Ignores unnecessary files to keep image size small.
config: {}
status: done
