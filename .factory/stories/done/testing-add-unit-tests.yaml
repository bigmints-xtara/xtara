feature:
  name: Add Unit Tests for Critical Code Paths
  slug: testing-add-unit-tests
target:
  app: xtara-web
phase: 2
dependsOn: []
description: >
  The audit confirmed 207 source files across 8 directories with exactly 0 test files. The critical assessment pipeline
  (LocationStep → AssessmentEngine → saveAssessment → generateRecommendations → waitForCareerPath) is the core business
  flow and has no test coverage. Key helper functions like `parseCourseName()` in LearnSection, `formatAssessmentData()`
  in assessment.ts, and the FirestoreService content methods (getStoriesForHome, getGoodReadsForHome,
  getChallengesForHome) all run on every render but have zero test coverage. The `convertAnonymousUser()` function
  handles a complex multi-step conversion (link credential, update profile, preserve pendingCareerPathId) that is
  critical for the user journey but has no test coverage.
dependencies: []
modules:
  - name: TestConfig
    path: vitest.config.ts
    description: Initialize Vitest (or Jest) with React Testing Library. Configure test setup with Next.js App Router
      conventions and Tailwind CSS.
  - name: AssessmentTests
    path: src/lib/firebase/assessment.test.ts
    description: Unit tests for `getQuestionnaire()`, `saveAssessment()`, `formatAssessmentData()`, `waitForCareerPath()`
      (mocked Firestore).
  - name: AuthHelpersTests
    path: src/lib/firebase/auth-helpers.test.ts
    description: Unit tests for `createAnonymousUser()`, `convertAnonymousUser()`, `getUserProfile()`. Mock Firebase Auth
      and Firestore.
  - name: FirestoreServiceTests
    path: src/lib/firebase/firestore-service.test.ts
    description: Unit tests for `getStoriesForHome()`, `getGoodReadsForHome()`, `getChallengesForHome()` with mocked
      Firestore snapshots and the 12-hour window logic.
  - name: CareerHelpersTests
    path: src/lib/firebase/career-helpers.test.ts
    description: Unit tests for `getCareerPathById()`, `getCareerTools()`, `normalize()` function.
  - name: TestSetup
    path: src/setup-tests.ts
    description: Test setup file with global mocks for Firebase SDK, Next.js useRouter, and Tailwind CSS.
behavior:
  - Test runner (Vitest or Jest) configured with React Testing Library.
  - Critical path: Assessment pipeline has test coverage for save, generate, and poll steps.
  - Auth helpers have tests for anonymous creation and email conversion.
  - Firestore service methods have mocked snapshot tests for the 12-hour window logic.
  - CI pipeline runs `npm test` as a pre-deploy gate.
  - Minimum 70% coverage on `src/lib/firebase/` directory.
config: {}
status: failed
