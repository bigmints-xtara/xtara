feature:
  name: Add Firestore Compound Index for Career Path Polling
  slug: data-firestore-index-career-paths
target:
  app: xtara-web
phase: 2
dependsOn: []
description: >
  The `waitForCareerPath()` function in `src/lib/firebase/assessment.ts` polls Firestore 30 times (every 2 seconds)
  using a query `where('assessmentId', '==', assessmentId)`. Without a compound index on the `assessmentId` field, each
  poll hits a collection scan on the `career_paths` collection, causing unnecessary reads and potential latency spikes.
  Firestore charges $0.084 per 1 million reads, and with 30 polls per assessment, each user costs 30 reads. A compound
  index on `assessmentId` + `createdAt` (descending) would reduce the query to an index lookup and enable a more
  efficient polling strategy. Additionally, the polling uses a fixed 2-second interval with no backoff, meaning if the
  Cloud Function takes 15 seconds to process, the user waits for 3 full polls (6 seconds) of unnecessary reads before
  the result is found.
dependencies: []
modules:
  - name: FirestoreIndexConfig
    path: firestore.indexes.json
    description: Define a compound index on the `career_paths` collection for fields `assessmentId` (ascending) and
      `createdAt` (descending).
  - name: AssessmentService
    path: src/lib/firebase/assessment.ts
    description: Update `waitForCareerPath()` to use exponential backoff (2s → 4s → 8s → 16s) to reduce the number of
      Firestore reads during polling. Add `orderBy('createdAt', 'desc')` and `limit(1)` to the query.
behavior:
  - Firestore compound index is deployed for the `career_paths` collection.
  - "`waitForCareerPath()` uses exponential backoff (2s, 4s, 8s, 16s) instead of fixed 2-second intervals."
  - Polling query includes `orderBy('createdAt', 'desc')` and `limit(1)` for efficiency.
  - Reduced Firestore read costs for career path polling (from ~30 reads to ~6 reads).
  - Faster detection of career path results during peak polling windows.
config: {}
status: done
