feature:
  name: "Implement Automated CI/CD via GitHub Actions"
  slug: orchestration-ci-cd-actions
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  Deployment is currently manual via the local deploy.sh script. To improve reliability, traceability, and deployment speed, continuous deployment should be automated through GitHub Actions as outlined in DEPLOYMENT.md. This eliminates manual bottlenecks and local environment inconsistencies.
dependencies: []
modules:
  - name: GitHubActionsWorkflow
    path: .github/workflows/deploy.yml
    description: Pipeline utilizing google-github-actions/auth and google-github-actions/deploy-cloudrun. Builds the image using Buildx and pushes to Artifact Registry automatically upon merges to the main branch. Configures GitHub OIDC for secure, keyless authentication with Google Cloud.
behavior:
  - Automatically triggers on merge to main branch.
  - Builds Docker image using Buildx.
  - Pushes image to Artifact Registry.
  - Authenticates via GitHub OIDC without stored keys.
config: {}
status: ready-to-build
