feature:
  name: "Migrate Environment Variables to Secret Manager"
  slug: orchestration-env-secrets
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  set-env.sh implies manual management of environment variables directly on Cloud Run. For sensitive values (like API keys and Firebase Admin secrets), this approach is insecure, prone to drift, and hard to track over time.
dependencies: []
modules:
  - name: SecretManagement
    path: set-env.sh
    description: Deprecate the set-env.sh script in favor of Terraform or CI/CD configuration.
behavior:
  - Sensitive environment variables are managed via Google Cloud Secret Manager.
  - Cloud Run mounts secrets directly instead of plain-text environment variables.
config: {}
status: ready-to-build
