feature:
  name: "Deduplicate CareerPath Interface Across Codebase"
  slug: data-deduplicate-careerpath-interface
target:
  app: xtara-web
phase: 2
dependsOn: []
description: >
  The `CareerPath` interface is defined in two separate files with slightly different shapes: `src/types/career.ts` and `src/lib/firebase/career-helpers.ts`. The type file has fields like `careerName`, `streamSuggestions`, `expectedSalaryRange`, `strengths`, and `double` as a primitive. The helpers file has `title`, `whatYouDo`, `salary`, `education`, `technicalSkills`, `softSkills`, `courses`, `careerPathway`, `primaryCareer`, `grow`, and `ragOutput`. The duplication causes implicit `any` types when casting between them, and `career-helpers.ts` uses `any[]` for arrays (e.g., `topInstitutions`, `onlineTrainings`, `toolsAndSoftware`). This creates a type-safety gap where the `LearnSection` component has to guess at data structure via fallback chains like `careerPath.primaryCareer?.courses || careerPath.courses || careerPath.recommendedCourses || ...`.
dependencies: []
modules:
  - name: CareerTypes
    path: src/types/career.ts
    description: Merge both CareerPath definitions into a single authoritative interface. Use nested interfaces for complex sub-types (PrimaryCareer, CareerPathway, RagOutput).
  - name: CareerHelpers
    path: src/lib/firebase/career-helpers.ts
    description: Replace the inline CareerPath interface with `import { CareerPath } from '@/types/career'`. Update type casts and return types.
  - name: LearnSection
    path: src/components/careers/sections/LearnSection.tsx
    description: Replace fallback chains with typed getters using the unified CareerPath interface.
  - name: CareerPathwayTypes
    path: src/types/career.ts
    description: Define sub-interfaces: `CareerPathwayStep`, `PrimaryCareer`, `RagOutput`, `RelatedCareer` to replace `any[]`.
behavior:
  - Single authoritative `CareerPath` interface in `src/types/career.ts`.
  - Zero implicit `any` types for CareerPath fields.
  - All components import CareerPath from the single source.
  - TypeScript compiler catches mismatched fields across the codebase.
  - Nested types (CareerPathwayStep, PrimaryCareer, RagOutput) are explicitly typed.
config: {}
status: ready-to-build
