  ## STEP 4: Create src/components/admin/editors/CareerPathEditor.tsx

  Create this file with a read-mostly editor:

  ```typescript

  'use client';


  import { useState, useEffect } from 'react';

  import type { AdminCareerPath } from '@/types/admin';


  interface CareerPathEditorProps {
    careerPath: AdminCareerPath | null;
    onSave: (data: Partial<AdminCareerPath>) => Promise<void>;
    onCancel: () => void;
  }


  export default function CareerPathEditor({ careerPath, onSave, onCancel }:
  CareerPathEditorProps) {
    const [title, setTitle] = useState('');
    const [description, setDescription] = useState('');
    const [whatYouDo, setWhatYouDo] = useState('');
    const [whyItMatters, setWhyItMatters] = useState('');
    const [matchReasoning, setMatchReasoning] = useState('');

    useEffect(() => {
      if (careerPath) {
        setTitle(careerPath.title || '');
        setDescription(careerPath.description || '');
        setWhatYouDo(careerPath.whatYouDo || '');
        setWhyItMatters(careerPath.whyItMatters || '');
        setMatchReasoning(careerPath.matchReasoning || '');
      } else {
        setTitle('');
        setDescription('');
        setWhatYouDo('');
        setWhyItMatters('');
        setMatchReasoning('');
      }
    }, [careerPath]);

    const handleSave = async () => {
      await onSave({
        title,
        description,
        whatYouDo,
        whyItMatters,
        matchReasoning,
      });
    };

    if (!careerPath) {
      return <div className="p-4 text-gray-500">Select a career path to view details.</div>;
    }

    return (
      <div className="p-4 space-y-6 max-h-full overflow-y-auto">
        {/* Overview - Read Only */}
        <section className="border-b pb-4">
          <h3 className="text-lg font-semibold mb-3">Overview</h3>
          <div className="grid grid-cols-2 gap-2 text-sm">
            <div><span className="font-medium">User ID:</span> {careerPath.userId}</div>
            <div><span className="font-medium">Career:</span> {careerPath.careerName}</div>
            <div><span className="font-medium">Match Score:</span> {careerPath.matchScore}</div>
            <div><span className="font-medium">Salary Range:</span> {careerPath.expectedSalaryRange || 'N/A'}</div>
          </div>
        </section>

        {/* Editable Fields */}
        <section className="border-b pb-4">
          <h3 className="text-lg font-semibold mb-3">Editable Fields</h3>
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-medium mb-1">Title</label>
              <input
                type="text"
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                className="w-full border rounded px-3 py-2 text-sm"
              />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">Description</label>
              <textarea
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                rows={3}
                className="w-full border rounded px-3 py-2 text-sm"
              />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">What You Do</label>
              <textarea
                value={whatYouDo}
                onChange={(e) => setWhatYouDo(e.target.value)}
                rows={3}
                className="w-full border rounded px-3 py-2 text-sm"
              />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">Why It Matters</label>
              <textarea
                value={whyItMatters}
                onChange={(e) => setWhyItMatters(e.target.value)}
                rows={3}
                className="w-full border rounded px-3 py-2 text-sm"
              />
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">Match Reasoning</label>
              <textarea
                value={matchReasoning}
                onChange={(e) => setMatchReasoning(e.target.value)}
                rows={3}
                className="w-full border rounded px-3 py-2 text-sm"
              />
            </div>
          </div>
        </section>

        {/* Read-Only Lists */}
        <section className="border-b pb-4">
          <h3 className="text-lg font-semibold mb-3">AI-Generated Data</h3>
          
          {careerPath.strengths?.length && (
            <div className="mb-3">
              <span className="font-medium text-sm">Strengths:</span>
              <div className="flex flex-wrap gap-1 mt-1">
                {careerPath.strengths.map((s, i) => (
                  <span key={i} className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">{s}</span>
                ))}
              </div>
            </div>
          )}

          {careerPath.archetypes?.length && (
            <div className="mb-3">
              <span className="font-medium text-sm">Archetypes:</span>
              <div className="flex flex-wrap gap-1 mt-1">
                {careerPath.archetypes.map((a, i) => (
                  <span key={i} className="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">{a}</span>
                ))}
              </div>
            </div>
          )}

          {careerPath.streamSuggestions?.length && (
            <div className="mb-3">
              <span className="font-medium text-sm">Stream Suggestions:</span>
              <div className="flex flex-wrap gap-1 mt-1">
                {careerPath.streamSuggestions.map((s, i) => (
                  <span key={i} className="bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded-full">{s}</span>
                ))}
              </div>
            </div>
          )}
        </section>

        {/* Career Pathway - Read Only */}
        {careerPath.careerPathway?.length && (
          <section className="border-b pb-4">
            <h3 className="text-lg font-semibold mb-3">Career Pathway</h3>
            <ul className="space-y-2">
              {careerPath.careerPathway.map((step, i) => (
                <li key={i} className="text-sm">
                  <span className="font-medium">{step.title}</span> — {step.duration}
                  {step.note && <span className="text-gray-500"> ({step.note})</span>}
                </li>
              ))}
            </ul>
          </section>
        )}

        {/* Related Careers - Read Only */}
        {careerPath.relatedCareers?.length && (
          <section className="border-b pb-4">
            <h3 className="text-lg font-semibold mb-3">Related Careers</h3>
            <ul className="space-y-2">
              {careerPath.relatedCareers.map((rc, i) => (
                <li key={i} className="text-sm">
                  <span className="font-medium">{rc.title}:</span> {rc.reason}
                </li>
              ))}
            </ul>
          </section>
        )}

        {/* Actions */}
        <div className="flex gap-2">
          <button
            onClick={handleSave}
            className="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700"
          >
            Save
          </button>
          <button
            onClick={onCancel}
            className="border px-4 py-2 rounded text-sm hover:bg-gray-50"
          >
            Cancel
          </button>
        </div>
      </div>
    );
  }

  ```


  Verify: `npx tsc --noEmit`


