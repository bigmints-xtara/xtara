  ## STEP 3: Create src/lib/admin/configs/dreamCareersConfig.ts

  Create this file following the exact pattern from challengesConfig.ts:

  ```typescript

  import type { AdminConfig, AdminEntity } from '@/types/admin';

  import type { AdminCareerPath } from '@/types/admin';

  import { collection, onSnapshot } from 'firebase/firestore';

  import { db } from '@/lib/firebase/firebase';


  export const dreamCareersConfig: AdminConfig<AdminCareerPath> = {
    entityName: 'Career Path',
    entityNamePlural: 'Career Paths',
    collectionName: 'career_paths',

    createEmpty(): AdminCareerPath {
      return {
        id: '',
        userId: '',
        careerName: '',
        createdAt: new Date(),
      };
    },

    getTitle(entity: AdminCareerPath): string {
      return entity.careerName || entity.title || 'Untitled';
    },

    getSubtitle(entity: AdminCareerPath): string {
      return entity.userId;
    },

    getStatus(_entity: AdminCareerPath): string {
      return 'published';
    },

    getDomain(entity: AdminCareerPath): string {
      return entity.archetypes?.[0] || 'General';
    },

    getSearchText(entity: AdminCareerPath): string {
      return `${entity.careerName} ${entity.userId}`.toLowerCase();
    },

    availableStatuses: ['all'],

    getAvailableDomains(entities: AdminCareerPath[]): string[] {
      const domains = entities.map(e => e.archetypes?.[0]).filter(Boolean) as string[];
      return [...new Set(domains)];
    },

    toFirestore(entity: AdminCareerPath): Omit<AdminCareerPath, 'id'> {
      const { id, ...rest } = entity;
      return {
        ...rest,
        updatedAt: new Date(),
      };
    },

    fromFirestore(data: Record<string, any>, id: string): AdminCareerPath {
      return {
        id,
        ...data,
        createdAt: data.createdAt?.toDate?.() || new Date(),
      } as AdminCareerPath;
    },

    streamAll(callback: (entities: AdminCareerPath[]) => void) {
      const ref = collection(db, 'career_paths');
      return onSnapshot(ref, (snapshot) => {
        const entities: AdminCareerPath[] = [];
        snapshot.forEach((doc) => {
          entities.push(this.fromFirestore(doc.data(), doc.id));
        });
        // Deduplicate by id (handles React Strict Mode double-mounting)
        const deduped = Object.values(
          entities.reduce((acc, entity) => {
            acc[entity.id] = entity;
            return acc;
          }, {} as Record<string, AdminCareerPath>)
        );
        callback(deduped);
      });
    },
  };

  ```


