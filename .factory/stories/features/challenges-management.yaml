feature:
  name: "Implement Challenges Management Module"
  slug: challenges-management
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  As a Content Manager, I want to manage "Challenges" from `/admin/challenges`
  using the same `AdminMasterDetail` pattern as Stories, so I can create, edit,
  and schedule Challenge records including their question arrays in Firestore.

  ---

  ## What exists today
  - `src/app/admin/challenges/page.tsx` exists but is a "Coming Soon" placeholder.
  - Firestore collection is `challenges` (confirmed in `firestore-service.ts` line 194).
  - `src/types/admin.ts` has a minimal `Challenge` interface that is **incomplete**:
    ```ts
    // CURRENT (incomplete)
    export interface Challenge extends AdminEntity {
      title: string;
      image: string;
      publishedAt?: Date;
      publishedUntil?: Date;
    }
    ```
  - `src/types/index.ts` has the full `IChallenge` and `IChallengeQuestion` interfaces
    reflecting the actual Firestore schema:
    ```ts
    export interface IChallenge {
      id: string;
      title: string;
      image: string;
      domain: string;
      published: boolean;
      draft: boolean;
      inReview: boolean;
      hyperlink?: string;
      hyperlinkText?: string;
      callToAction?: string;
      careerRelevance: string[];
      type: string;
      rewardPerQuestion: number;
      instructions: string;
      questions: IChallengeQuestion[];
      createdAt: string;
      publishedAt?: string;
      publishedUntil?: string;
      updatedAt: string;
    }

    export interface IChallengeQuestion {
      title: string;
      options: string[];
      correctAnswer: number;  // index into options[]
      explanation: string;
    }
    ```

  ## What needs to be built

  ### 1. Replace `Challenge` in `src/types/admin.ts`
  Replace the incomplete interface with the full schema, importing the sub-type:
  ```ts
  export interface ChallengeQuestion {
    title: string;
    options: string[];
    correctAnswer: number;
    explanation: string;
  }

  export interface Challenge extends AdminEntity {
    title: string;
    image: string;
    domain: string;
    published: boolean;
    draft: boolean;
    inReview: boolean;
    hyperlink?: string;
    hyperlinkText?: string;
    callToAction?: string;
    careerRelevance: string[];
    type: string;
    rewardPerQuestion: number;
    instructions: string;
    questions: ChallengeQuestion[];
    publishedAt?: Date;
    publishedUntil?: Date;
  }
  ```

  ### 2. Create `src/lib/admin/configs/challengesConfig.ts`
  Mirror `storiesConfig.ts`. Key specifics:
  - `entityName: 'Challenge'`, `entityNamePlural: 'Challenges'`
  - `collectionName: 'challenges'`  ← exact Firestore collection name
  - `createEmpty()` → `{ title: '', image: '', domain: '', published: false, draft: true, inReview: false, careerRelevance: [], type: '', rewardPerQuestion: 0, instructions: '', questions: [] }`
  - `getTitle(entity)` → `entity.title`
  - `getSubtitle(entity)` → `entity.type`
  - `getStatus(entity)` → 3-state: published → 'published', inReview → 'inReview', else 'draft'
  - `getDomain(entity)` → `entity.domain`
  - `getSearchText(entity)` → `${entity.title} ${entity.instructions}`.toLowerCase()
  - `getAvailableDomains(entities)` → collect unique `domain` values
  - `toFirestore(entity)` → spread entity minus `id`, convert Date fields to Timestamps, add `updatedAt: new Date()`
  - `fromFirestore(data, id)` → cast as Challenge, convert Timestamps to Dates

  ### 3. Create `src/components/admin/editors/ChallengeEditor.tsx`
  Component signature:
  ```ts
  interface ChallengeEditorProps {
    challenge: Challenge | null;
    onSave: (data: Partial<Challenge>) => Promise<void>;
    onCancel: () => void;
  }
  ```
  Sections to render:
  - **Basic Info**: Title (text, required), Type (text), Domain (text), Image URL (text)
  - **Content**: Instructions (textarea), Call To Action (text), Hyperlink + Hyperlink Text (text)
  - **Scoring**: Reward Per Question (number input, min=0)
  - **Career Relevance**: add/remove chip list (same pattern as StoryEditor)
  - **Status**: select (Draft / In Review / Published) controlling `published`, `draft`, `inReview` booleans
  - **Schedule**: Published At and Published Until (datetime-local inputs, optional)
  - **Questions**: A dynamic list where the admin can:
    - Click "Add Question" to append a new blank `ChallengeQuestion` to the array
    - For each question, edit: `title` (text), `options` (a sub-list of up to 4 string inputs), `correctAnswer` (number input, must be 0–options.length-1), `explanation` (text)
    - Click a trash icon to remove a question
  - **Save** and **Cancel** buttons

  ### 4. Replace `src/app/admin/challenges/page.tsx`
  ```tsx
  'use client';
  import AdminMasterDetail from '@/components/admin/AdminMasterDetail';
  import ChallengeEditor from '@/components/admin/editors/ChallengeEditor';
  import { challengesConfig } from '@/lib/admin/configs/challengesConfig';
  import type { Challenge } from '@/types/admin';

  export default function AdminChallengesPage() {
    return (
      <div className="h-full">
        <AdminMasterDetail<Challenge>
          config={challengesConfig}
          renderEditor={(challenge, onSave, onCancel) => (
            <ChallengeEditor challenge={challenge} onSave={onSave} onCancel={onCancel} />
          )}
        />
      </div>
    );
  }
  ```

dependencies: []
modules:
  - name: Challenge and ChallengeQuestion interfaces
    path: src/types/admin.ts
    description: Replace incomplete Challenge with full schema. Add ChallengeQuestion sub-type.
  - name: challengesConfig
    path: src/lib/admin/configs/challengesConfig.ts
    description: New file. AdminConfig<Challenge> using collectionName 'challenges'.
  - name: ChallengeEditor
    path: src/components/admin/editors/ChallengeEditor.tsx
    description: New file. Editor form including the dynamic questions array editor.
  - name: AdminChallengesPage
    path: src/app/admin/challenges/page.tsx
    description: Replace Coming Soon with AdminMasterDetail<Challenge>.
behavior:
  - "Given an admin visits /admin/challenges, they see a list of Challenge documents from the 'challenges' Firestore collection."
  - "When an admin adds a question, fills in title, 4 options, sets correctAnswer to 2, and saves — the questions array is persisted as a subcollection-style array in the Firestore document."
  - "When an admin sets rewardPerQuestion to a negative number, the form blocks saving with an inline validation error."
config: {}
status: draft
