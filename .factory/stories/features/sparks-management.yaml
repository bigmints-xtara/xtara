feature:
  name: "Implement Sparks Management Module"
  slug: sparks-management
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  As a Content Administrator, I want to manage "Sparks" from `/admin/sparks`
  using the same `AdminMasterDetail` architecture as the Stories module, so
  that I can create, edit, publish, and delete Spark records in Firestore
  without touching code.

  ---

  ## What exists today
  - `src/app/admin/sparks/page.tsx` exists but renders a "Coming Soon" placeholder.
  - The `Spark` interface is already defined in `src/types/admin.ts`:
    ```ts
    export interface Spark extends AdminEntity {
      title: string;
      type: string;
      published: boolean;
    }
    ```
  - The Firestore collection is `sparks` (confirmed in `firestore-service.ts` line 290).
  - The existing `firestore-service.ts` queries `sparks` with `where('published', '==', true)` and `where('draft', '==', false)` — meaning Sparks also carry a `draft` field in Firestore even though it is absent from the admin TS type. **Add `draft: boolean` to the `Spark` interface.**

  ## What needs to be built

  ### 1. Extend `src/types/admin.ts` — `Spark` interface
  Add the missing `draft` field so the admin and public layer are consistent:
  ```ts
  export interface Spark extends AdminEntity {
    title: string;
    type: string;
    published: boolean;
    draft: boolean;      // ADD THIS — queried in firestore-service.ts line 293
    inReview: boolean;   // ADD THIS — follow the same 3-state status pattern as Story
  }
  ```

  ### 2. Create `src/lib/admin/configs/sparksConfig.ts`
  Model this **exactly** after `storiesConfig.ts`. Key differences:
  - `entityName: 'Spark'`, `entityNamePlural: 'Sparks'`
  - `collectionName: 'sparks'`
  - `createEmpty()` returns `{ title: '', type: '', published: false, draft: true, inReview: false }`
  - `getTitle(entity)` → `entity.title`
  - `getSubtitle(entity)` → `entity.type`
  - `getStatus(entity)` → same 3-state logic as stories: if published → 'published', if inReview → 'inReview', else 'draft'
  - `getDomain(entity)` → `entity.type` (use the type as the domain grouping for filtering)
  - `getSearchText(entity)` → `${entity.title} ${entity.type}`.toLowerCase()
  - `getAvailableDomains(entities)` → collect unique `type` values
  - `toFirestore(entity)` → spread entity minus `id`, add `updatedAt: new Date()`
  - `fromFirestore(data, id)` → cast as Spark and attach id

  ### 3. Create `src/components/admin/editors/SparkEditor.tsx`
  Model this **exactly** after `StoryEditor.tsx`. The component signature must be:
  ```ts
  interface SparkEditorProps {
    spark: Spark | null;
    onSave: (data: Partial<Spark>) => Promise<void>;
    onCancel: () => void;
  }
  ```
  Fields to render:
  - **Title** (text input, required)
  - **Type** (text input — e.g. "motivation", "fact", "tip". No fixed enum yet)
  - **Status** (select dropdown: Draft / In Review / Published — controls the `published`, `draft`, `inReview` booleans identically to StoryEditor)
  - **Save** and **Cancel** buttons

  ### 4. Replace `src/app/admin/sparks/page.tsx`
  Replace the Coming Soon placeholder with the **exact same pattern** as `src/app/admin/stories/page.tsx`:
  ```tsx
  'use client';
  import AdminMasterDetail from '@/components/admin/AdminMasterDetail';
  import SparkEditor from '@/components/admin/editors/SparkEditor';
  import { sparksConfig } from '@/lib/admin/configs/sparksConfig';
  import type { Spark } from '@/types/admin';

  export default function AdminSparksPage() {
    return (
      <div className="h-full">
        <AdminMasterDetail<Spark>
          config={sparksConfig}
          renderEditor={(spark, onSave, onCancel) => (
            <SparkEditor spark={spark} onSave={onSave} onCancel={onCancel} />
          )}
        />
      </div>
    );
  }
  ```

dependencies: []
modules:
  - name: Spark interface
    path: src/types/admin.ts
    description: Add `draft` and `inReview` boolean fields to the existing Spark interface.
  - name: sparksConfig
    path: src/lib/admin/configs/sparksConfig.ts
    description: New file. AdminConfig<Spark> implementation, mirroring storiesConfig.ts exactly.
  - name: SparkEditor
    path: src/components/admin/editors/SparkEditor.tsx
    description: New file. Editor form component mirroring StoryEditor.tsx structure with Spark-specific fields only.
  - name: AdminSparksPage
    path: src/app/admin/sparks/page.tsx
    description: Replace Coming Soon JSX with AdminMasterDetail<Spark>.
behavior:
  - "Given an admin visits /admin/sparks, they see a searchable, filterable list of all Spark documents from the 'sparks' Firestore collection."
  - "When an admin clicks 'New', the editor pane opens with an empty form (title='', type='', status=Draft)."
  - "When an admin fills in title and type, then saves, a new document is created in the 'sparks' collection with createdAt, updatedAt Timestamps and draft=true."
  - "When an admin selects an existing Spark and changes its status to Published, the document is updated with published=true, draft=false, inReview=false."
config: {}
status: ready-to-build
