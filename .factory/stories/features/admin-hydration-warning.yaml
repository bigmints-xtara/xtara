feature:
  name: "Resolve Active Hydration Warnings in Admin Panel"
  slug: admin-hydration-warning
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  Across the admin panel, there is a persistent Next.js issues overlay badge ("1 Issue") visible in the bottom-left corner indicating an unresolved hydration error, console error, or strict-mode warning.
dependencies: []
modules:
  - name: AdminComponents
    path: src/components/admin/
    description: Fix the underlying hydration mismatch (e.g., invalid HTML nesting, mismatching dates).
behavior:
  - The admin panel loads cleanly without the Next.js "Issues" badge appearing in development.
  - No hydration mismatch or unhandled warnings appear in the browser console upon initial page load.
config: {}
status: draft
