feature:
  name: "Fix 'Create New Story' Form State Bleed"
  slug: admin-form-state-bleed
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  When navigating the Admin UI (e.g., /admin/stories), clicking on an existing story correctly populates the editor with its data. However, if the user subsequently clicks the "New" button to create a new entity, the form remains populated with the previously selected story's data instead of resetting to a blank state.
dependencies: []
modules:
  - name: AdminMasterDetail
    path: src/components/admin/AdminMasterDetail.tsx
    description: Handle creation state by properly clearing the selected entity.
  - name: StoryEditor
    path: src/components/admin/editors/StoryEditor.tsx
    description: Ensure local state resets when the selected story switches to null.
behavior:
  - Clicking the "New" button after viewing/editing an existing story opens a completely blank form.
  - Submitting the "New" form creates a brand new record.
  - Canceling the "New" action restores the UI appropriately without breaking selection state.
config: {}
status: ready-to-build
