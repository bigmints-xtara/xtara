feature:
  name: "Remove Firebase Admin SDK from Client-Side Bundle"
  slug: security-remove-firebase-admin-client
target:
  app: xtara-web
phase: 2
dependsOn: [security-firestore-rules]
description: >
  The package.json lists `firebase-admin` as a client-side dependency (version 13.6.0), and the Firebase Admin SDK is imported directly into the client bundle. Firebase Admin is designed to run in the server environment (Node.js) and exposes the Service Account key, database, and authentication state to the client. When included in the client bundle, it can leak the service account token (Bearer token), expose Firestore read/write access to the browser, and bloat the JS bundle by ~300KB (Gzip). The audit confirmed that `firebase-admin` is listed in `package.json` dependencies but only `firebase/auth` (client SDK) is used in `src/lib/firebase/firebase.ts`.
dependencies: []
modules:
  - name: FirebaseModule
    path: src/lib/firebase/firebase.ts
    description: Audit imports. Ensure `firebase-admin` is not imported via the client SDK. Remove `firebase-admin` from `package.json` dependencies or move it to a server-only module (e.g., API route or Server Component).
  - name: PackageJson
    path: package.json
    description: Move `firebase-admin` from `dependencies` to `devDependencies` if only used at build time, or remove entirely if not used in the web client.
  - name: ServerFirebaseModule
    path: src/lib/firebase/server.ts
    description: Create a server-only Firebase Admin module using dynamic `require` or `use server` directive to ensure tree-shaking excludes it from the client bundle.
behavior:
  - `firebase-admin` is excluded from the client-side JavaScript bundle.
  - Client SDK (`firebase/app`, `firebase/auth`, `firebase/firestore`, `firebase/storage`, `firebase/functions`) remains available in client components.
  - Server-side Firebase Admin SDK is available in API routes or Server Components via `use server` or dynamic `import()` with `webpackChunkName`.
  - Bundle size is reduced by the firebase-admin package (~300KB Gzip).
  - No service account tokens are exposed to the browser.
config: {}
status: draft
