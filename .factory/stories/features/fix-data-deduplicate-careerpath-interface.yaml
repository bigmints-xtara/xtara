fix_instructions: >-
  Fix the CareerPath type deduplication build errors:


  1. Check `src/types/career.ts` for syntax errors. The build says "The module
  has no exports at all" which means there's likely a syntax error. Verify the
  file parses correctly with `npx tsc --noEmit src/types/career.ts`.


  2. In `src/lib/firebase/career-helpers.ts`:
     - Change `import { CareerPath } from '@/types/career';` to `import type { CareerPath } from '@/types/career';`
     - Remove `export { CareerPath };` or change to `export type { CareerPath } from '@/types/career';`

  3. In `src/components/home/CurrentGoalCard.tsx`:
     - Change `import { CareerPath, getCareerPathById } from "@/types/career"` to:
       ```typescript
       import type { CareerPath } from "@/types/career";
       import { getCareerPathById } from "@/lib/firebase/career-helpers";
       ```
     - Search the codebase for any other files importing `getCareerPathById` from `@/types/career` and fix them similarly.

  4. Verify the build passes with `npm run build`.
