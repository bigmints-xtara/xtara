feature:
  name: Implement Games Management Module
  slug: games-management
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  As a Game Content Administrator, I want to manage "Games" from `/admin/games` using the same `AdminMasterDetail`
  architecture as other modules, so that I can create, edit, schedule, and publish game instances in Firestore.

  ---

  ## What exists today
  - Firestore collection is `game_instances`.
  - The type is defined in `src/types/admin.ts` as `GameInstance`:
    ```ts
    export interface GameInstance extends AdminEntity {
      title: string;
      mode: 'quiz' | 'puzzle' | 'memory';
      isPublished: boolean;
      schedule: {
        startDateTime: Date;
        endDateTime: Date;
      };
    }
    ```

  ## What needs to be built

  ### 1. Create `src/lib/admin/configs/gamesConfig.ts`
  Model this after other configs (like `sparksConfig.ts`).
  - `entityName: 'Game'`
  - `entityNamePlural: 'Games'`
  - `collectionName: 'game_instances'`
  - `createEmpty()` returns:
    ```ts
    {
      title: '',
      mode: 'quiz',
      isPublished: false,
      schedule: {
        startDateTime: new Date(),
        endDateTime: new Date(Date.now() + 86400000 * 7), // 7 days from now
      }
    }
    ```
  - `getId(entity)` -> `entity.id`
  - `getTitle(entity)` -> `entity.title`
  - `getSubtitle(entity)` -> `entity.mode`
  - `getStatus(entity)` -> `entity.isPublished ? 'published' : 'draft'`
  - `getDomain(entity)` -> `entity.mode`
  - `getSearchText(entity)` -> `${entity.title} ${entity.mode}`.toLowerCase()
  - `availableStatuses` -> `['all', 'published', 'draft']`
  - `getAvailableDomains(entities)` -> `['all', 'quiz', 'puzzle', 'memory']`
  - `toFirestore(entity)` -> Spread entity minus `id`, converting nested dates to JS Dates (which Firestore SDK serializes to Timestamps) and adding `updatedAt: new Date()`.
  - `fromFirestore(data, id)` ->
    - Cast as `GameInstance`.
    - Safely convert `schedule.startDateTime` and `schedule.endDateTime` from Firestore Timestamps to JS Dates using `.toDate()` if they exist.
    - Attach `id`.

  ### 2. Create `src/components/admin/editors/GameEditor.tsx`
  A component for creating and updating a game instance.
  - Component Signature:
    ```ts
    interface GameEditorProps {
      game: GameInstance | null;
      onSave: (data: Partial<GameInstance>) => Promise<void>;
      onCancel: () => void;
    }
    ```
  - Form fields to render:
    - **Title** (text input, required)
    - **Mode** (select dropdown: `quiz` / `puzzle` / `memory`)
    - **Status** (checkbox/switch/select for `isPublished`)
    - **Schedule Start Date Time** (datetime-local input):
      Value formatted to string (`new Date(startDateTime).toISOString().slice(0, 16)`) and parsed back to Date on change.
    - **Schedule End Date Time** (datetime-local input):
      Value formatted and parsed identically.
    - **Save** and **Cancel** buttons with saving/loading states.

  ### 3. Create `src/app/admin/games/page.tsx`
  - Render `AdminMasterDetail` component with the `gamesConfig` and `GameEditor`.
  - Uses standard client-side components.

  ### 4. Ensure Import Path Safety
  All files must compile cleanly with TypeScript. No relative imports from deleted `src/lib/firebase.ts`; use `@/lib/firebase/firebase` instead.
