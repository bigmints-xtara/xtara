feature:
  name: Add Data Caching Layer for Firestore Reads
  slug: performance-add-react-query-caching
target:
  app: xtara-web
phase: 2
dependsOn: []
description: >
  Every component that reads from Firestore issues its own `getDocs()` call on every render/navigation. There is no
  caching strategy (e.g., React Query, SWR, or custom memoization). This causes: (1) N+1 query waterfalls when multiple
  components fetch data on the same page (e.g., CareerHubLayout + LearnSection each call `getCareerPathById`), (2)
  redundant reads when the user navigates between tabs (Learn, Connect, Grow), and (3) no stale-while-revalidating
  pattern for content collections like stories and good_reads. The audit confirmed 0 test files exist and 120+
  components fetch data directly without caching.
dependencies: []
modules:
  - name: ReactQueryProvider
    path: src/lib/query/query-client.ts
    description: Initialize React Query (TanStack Query) with a shared QueryClient. Configure staleTime, gcTime, and retry
      strategies for Firestore reads.
  - name: FirestoreQueryHooks
    path: src/lib/query/useFirestoreQuery.ts
    description: Generic hook that wraps Firestore `getDocs()` calls with `useQuery`. Caches results by collection name and
      query params.
  - name: AuthQueryHook
    path: src/context/AuthContext.tsx
    description: Replace the `onAuthStateChanged` + `getUserProfile` waterfall with a React Query `useInfiniteQuery` pattern
      that caches the user profile.
  - name: CareerPathQuery
    path: src/lib/query/useCareerPath.ts
    description: Add `useQuery` wrapper for career path reads with a 5-minute stale time. Dedup fetches when CareerHubLayout
      and child components both need the same path.
  - name: ContentQuery
    path: src/lib/query/useContentQuery.ts
    description: Add cached queries for stories, good_reads, challenges, and sparks with 12-hour stale time (matching the
      12-hour window logic in FirestoreService).
behavior:
  - Firestore reads are cached via React Query (TanStack Query).
  - Duplicate fetches on the same page are deduped (e.g., CareerHubLayout + LearnSection share one career path fetch).
  - Navigation between tabs (Learn/Connect/Grow) reuses cached data.
  - Content collections (stories, good_reads) have 12-hour stale time matching the 12-hour window logic.
  - User profile is cached and revalidated on auth state changes.
  - Network reads reduced by ~60% for typical user sessions.
config: {}
status: failed
