feature:
  name: "Implement Good Reads Management Module"
  slug: good-reads-management
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  As a Content Manager, I want to manage "Good Reads" from `/admin/good-reads`
  using the same `AdminMasterDetail` pattern as Stories, so I can create, edit,
  publish, and schedule GoodRead records in Firestore.

  ---

  ## What exists today
  - `src/app/admin/good-reads/page.tsx` exists but is a "Coming Soon" placeholder.
  - Firestore collection is `good_reads` (confirmed in `firestore-service.ts` line 144).
  - `src/types/admin.ts` has a minimal `GoodRead` interface that is **incomplete** relative to what Firestore actually stores:
    ```ts
    // CURRENT (incomplete)
    export interface GoodRead extends AdminEntity {
      title: string;
      image: string;
      publishedAt?: Date;
      publishedUntil?: Date;
    }
    ```
  - `src/types/index.ts` has the full `IGoodRead` interface with all the real Firestore fields:
    ```ts
    export interface IGoodRead {
      id: string;
      title: string;
      image: string;
      domain: string;
      published: boolean;
      draft: boolean;
      inReview: boolean;
      hyperlink?: string;
      hyperlinkText?: string;
      careerRelevance: string[];
      type: string;
      content: string;
      createdAt: string;
      publishedAt?: string;
      publishedUntil?: string;
      updatedAt: string;
    }
    ```

  ## What needs to be built

  ### 1. Replace `GoodRead` in `src/types/admin.ts`
  The existing `GoodRead` interface must be replaced with a complete version
  aligned to the real Firestore schema (sourced from `IGoodRead` in `index.ts`):
  ```ts
  export interface GoodRead extends AdminEntity {
    title: string;
    image: string;
    domain: string;
    published: boolean;
    draft: boolean;
    inReview: boolean;
    hyperlink?: string;
    hyperlinkText?: string;
    careerRelevance: string[];
    type: string;
    content: string;
    publishedAt?: Date;
    publishedUntil?: Date;
  }
  ```

  ### 2. Create `src/lib/admin/configs/goodReadsConfig.ts`
  Mirror `storiesConfig.ts` exactly. Key specifics:
  - `entityName: 'Good Read'`, `entityNamePlural: 'Good Reads'`
  - `collectionName: 'good_reads'`  ← exact Firestore collection name
  - `createEmpty()` → `{ title: '', image: '', domain: '', published: false, draft: true, inReview: false, careerRelevance: [], type: '', content: '' }`
  - `getTitle(entity)` → `entity.title`
  - `getSubtitle(entity)` → `entity.type`
  - `getStatus(entity)` → 3-state: published → 'published', inReview → 'inReview', else 'draft'
  - `getDomain(entity)` → `entity.domain`
  - `getSearchText(entity)` → `${entity.title} ${entity.content}`.toLowerCase()
  - `getAvailableDomains(entities)` → collect unique `domain` values
  - `toFirestore(entity)` → spread entity minus `id`, convert `publishedAt`/`publishedUntil` Dates to Timestamps if present, add `updatedAt: new Date()`
  - `fromFirestore(data, id)` → cast as GoodRead, convert Firestore Timestamps for `publishedAt`/`publishedUntil` to Dates via `.toDate()`

  ### 3. Create `src/components/admin/editors/GoodReadEditor.tsx`
  Component signature:
  ```ts
  interface GoodReadEditorProps {
    goodRead: GoodRead | null;
    onSave: (data: Partial<GoodRead>) => Promise<void>;
    onCancel: () => void;
  }
  ```
  Fields to render (all matching the interface above):
  - **Title** (text input, required)
  - **Type** (text input — e.g., "article", "video", "podcast")
  - **Domain** (text input)
  - **Content** (textarea)
  - **Image URL** (text input)
  - **Hyperlink** and **Hyperlink Text** (optional text inputs)
  - **Career Relevance** (add/remove chip list, same pattern as StoryEditor's `careerRelevance` section)
  - **Status** (select: Draft / In Review / Published — controls `published`, `draft`, `inReview` booleans)
  - **Published At** and **Published Until** (datetime-local inputs, optional)
  - **Save** and **Cancel** buttons

  ### 4. Replace `src/app/admin/good-reads/page.tsx`
  ```tsx
  'use client';
  import AdminMasterDetail from '@/components/admin/AdminMasterDetail';
  import GoodReadEditor from '@/components/admin/editors/GoodReadEditor';
  import { goodReadsConfig } from '@/lib/admin/configs/goodReadsConfig';
  import type { GoodRead } from '@/types/admin';

  export default function AdminGoodReadsPage() {
    return (
      <div className="h-full">
        <AdminMasterDetail<GoodRead>
          config={goodReadsConfig}
          renderEditor={(goodRead, onSave, onCancel) => (
            <GoodReadEditor goodRead={goodRead} onSave={onSave} onCancel={onCancel} />
          )}
        />
      </div>
    );
  }
  ```

dependencies: []
modules:
  - name: GoodRead interface
    path: src/types/admin.ts
    description: Replace the incomplete GoodRead interface with the full schema matching the real Firestore good_reads collection.
  - name: goodReadsConfig
    path: src/lib/admin/configs/goodReadsConfig.ts
    description: New file. AdminConfig<GoodRead> using collectionName 'good_reads'.
  - name: GoodReadEditor
    path: src/components/admin/editors/GoodReadEditor.tsx
    description: New file. Editor form for all GoodRead fields.
  - name: AdminGoodReadsPage
    path: src/app/admin/good-reads/page.tsx
    description: Replace Coming Soon with AdminMasterDetail<GoodRead>.
behavior:
  - "Given an admin visits /admin/good-reads, they see a list of documents from the 'good_reads' Firestore collection."
  - "When an admin creates a new Good Read with title, type, content and saves it, a document is written to 'good_reads' with draft=true, createdAt and updatedAt Timestamps."
  - "When an admin sets publishedAt and publishedUntil and saves, the values are stored as Firestore Timestamps (not strings)."
config: {}
status: draft
