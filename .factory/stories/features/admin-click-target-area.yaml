feature:
  name: "Improve Click Target Area for List Items"
  slug: admin-click-target-area
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  In the master list on the left pane, clicking the background of a story card or its description snippet does not trigger the selection of that story. The interactive click target appears to be restricted strictly to the h3 title element.
dependencies: []
modules:
  - name: AdminListTile
    path: src/components/admin/AdminListTile.tsx
    description: Refactor to wrap the entire card content in an interactive semantic element (button) with full padding clickable area and hover styles.
behavior:
  - Clicking anywhere within the bounding box of a list item card successfully selects the item.
  - Hovering over the card displays a cursor pointer and a visual hover effect.
  - Keyboard accessible.
config: {}
status: draft
