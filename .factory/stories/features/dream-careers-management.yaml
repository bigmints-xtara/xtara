feature:
  name: Implement Dream Careers (CareerPath) Management Module
  slug: dream-careers-management
target:
  app: xtara-web
phase: 1
dependsOn: []
description: >
  As an Administrator, I want to browse and manage user-generated Career Path records from `/admin/dream-careers` using
  the same `AdminMasterDetail` pattern, so I can moderate, view, and update career path documents.

  ---

  ## What exists today - `src/app/admin/dream-careers/page.tsx` exists but is a "Coming Soon" placeholder. - Firestore
  collection is `career_paths` (confirmed in `career-helpers.ts` line 43:
    `collection(db, "career_paths")`).
  - The full type is defined in `src/types/career.ts` as `CareerPath`:
    ```ts
    export interface CareerPath {
      id: string;
      userId: string;
      careerName: string;
      title?: string;
      whatYouDo?: string;
      whyItMatters?: string;
      matchScore?: number;
      streamSuggestions?: string[];
      expectedSalaryRange?: string;
      matchReasoning?: string;
      archetypes?: string[];
      careerPathway?: CareerPathwayStep[];
      internshipExamples?: any[];
      onlineTrainings?: any[];
      topInstitutions?: any[];
      relatedCareers?: RelatedCareer[];
      toolsAndSoftware?: any[];
      strengths?: string[];
      description?: string;
      createdAt: any;
    }

    export interface CareerPathwayStep {
      title: string;
      duration: string;
      note?: string;
    }

    export interface RelatedCareer {
      title: string;
      reason: string;
    }
    ```
  - `AdminEntity` requires `id`, `createdAt?`, `updatedAt?`. `CareerPath` already has `id`
    and `createdAt` but is **not** an `AdminEntity`. A bridge adapter is needed.

  ## What needs to be built

  ### 1. Add `CareerPath` to `src/types/admin.ts` as an AdminEntity Do NOT modify `src/types/career.ts`. Instead, define
  an admin-layer interface: ```ts import type { CareerPathwayStep, RelatedCareer } from '@/types/career';

  export interface AdminCareerPath extends AdminEntity {
    userId: string;
    careerName: string;
    title?: string;
    whatYouDo?: string;
    whyItMatters?: string;
    matchScore?: number;
    streamSuggestions?: string[];
    expectedSalaryRange?: string;
    matchReasoning?: string;
    archetypes?: string[];
    careerPathway?: CareerPathwayStep[];
    relatedCareers?: RelatedCareer[];
    strengths?: string[];
    description?: string;
  } ``` Note: `internshipExamples`, `onlineTrainings`, `topInstitutions`, `toolsAndSoftware` are unstructured `any[]`
  fields from AI generation — include them as `any[]` if needed but they do not need editor UI.

  ### 2. Create `src/lib/admin/configs/dreamCareersConfig.ts` - `entityName: 'Career Path'`, `entityNamePlural: 'Career
  Paths'` - `collectionName: 'career_paths'`  ← exact Firestore collection name - `createEmpty()` → not needed for
  create (CareerPaths are AI-generated, not manually created).
    Return an empty skeleton so the type is satisfied, but do NOT expose "New" button logic for this module.
  - `getTitle(entity)` → `entity.careerName || entity.title || 'Untitled'` - `getSubtitle(entity)` → `entity.userId` -
  `getStatus(entity)` → always return `'published'` (CareerPaths have no draft/publish workflow) - `getDomain(entity)` →
  `entity.archetypes?.[0] || 'General'` - `getSearchText(entity)` → `${entity.careerName}
  ${entity.userId}`.toLowerCase() - `availableStatuses` → `['all']` only (no status filtering needed) -
  `getAvailableDomains(entities)` → collect unique `archetypes[0]` values - `toFirestore(entity)` → spread entity minus
  `id`, add `updatedAt: new Date()` - `fromFirestore(data, id)` → cast as AdminCareerPath and attach id

  ### 3. Create `src/components/admin/editors/CareerPathEditor.tsx` This is a **read-mostly** editor. Career paths are
  AI-generated for users. The admin primarily needs to view them; limited edits (description, corrections) are
  acceptable. Component signature: ```ts interface CareerPathEditorProps {
    careerPath: AdminCareerPath | null;
    onSave: (data: Partial<AdminCareerPath>) => Promise<void>;
    onCancel: () => void;
  } ``` Sections to render: - **Overview** (read-only display): userId, careerName, matchScore, expectedSalaryRange -
  **Editable Fields**: title (text), description (textarea), whatYouDo (textarea), whyItMatters (textarea),
  matchReasoning (textarea) - **Lists** (read-only display, not editable): strengths, archetypes, streamSuggestions
    rendered as simple badge chips
  - **Career Pathway** (read-only list): each `CareerPathwayStep` displayed as `title — duration (note?)` - **Related
  Careers** (read-only list): each `RelatedCareer` displayed as `title: reason` - **Save** and **Cancel** buttons (save
  only sends the editable fields)

  ### 4. Replace `src/app/admin/dream-careers/page.tsx` ```tsx 'use client'; import AdminMasterDetail from
  '@/components/admin/AdminMasterDetail'; import CareerPathEditor from '@/components/admin/editors/CareerPathEditor';
  import { dreamCareersConfig } from '@/lib/admin/configs/dreamCareersConfig'; import type { AdminCareerPath } from
  '@/types/admin';

  export default function AdminDreamCareersPage() {
    return (
      <div className="h-full">
        <AdminMasterDetail<AdminCareerPath>
          config={dreamCareersConfig}
          renderEditor={(careerPath, onSave, onCancel) => (
            <CareerPathEditor careerPath={careerPath} onSave={onSave} onCancel={onCancel} />
          )}
        />
      </div>
    );
  } ```
dependencies: []
modules:
  - name: AdminCareerPath interface
    path: src/types/admin.ts
    description: Add new AdminCareerPath interface extending AdminEntity, bridging from the CareerPath type in career.ts.
  - name: dreamCareersConfig
    path: src/lib/admin/configs/dreamCareersConfig.ts
    description: New file. AdminConfig<AdminCareerPath> using collectionName 'career_paths'.
  - name: CareerPathEditor
    path: src/components/admin/editors/CareerPathEditor.tsx
    description: New file. Read-mostly editor with limited editable fields and read-only display for AI-generated data.
  - name: AdminDreamCareersPage
    path: src/app/admin/dream-careers/page.tsx
    description: Replace Coming Soon with AdminMasterDetail<AdminCareerPath>.
behavior:
  - Given an admin visits /admin/dream-careers, they see a list of CareerPath documents from the 'career_paths'
    Firestore collection, with careerName as title and userId as subtitle.
  - When an admin selects a career path, they see a read-mostly detail view showing AI-generated content and a few
    editable fields.
  - When an admin edits the description field and saves, only the modified editable fields are written back to Firestore.
config: {}
status: failed
